name: MediaAuto — Clôture des Marchés

on:
  schedule:
    # 21h30 UTC en semaine — après la clôture de Wall Street (16h ET)
    # = 23h30 Paris (été) / 22h30 (hiver). Le post arrive en "pending" pour le matin.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:   # déclenchement manuel depuis GitHub Actions

jobs:
  markets:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run markets close
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          NTFY_TOPIC:    ${{ secrets.NTFY_TOPIC }}
        run: |
          cd pipeline/markets
          python markets_main.py

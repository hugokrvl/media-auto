name: MediaAuto — Pipeline nocturne

on:
  schedule:
    # 1h00 heure Paris (UTC+1 hiver = 00:00 UTC, UTC+2 été = 23:00 UTC)
    # On utilise 23:00 UTC pour couvrir l'heure d'été (France)
    - cron: "0 23 * * *"
  workflow_dispatch:  # déclenchement manuel possible depuis GitHub

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NEWSLETTER_EMAIL: ${{ secrets.NEWSLETTER_EMAIL }}
          NEWSLETTER_PASSWORD: ${{ secrets.NEWSLETTER_PASSWORD }}
          NEWSLETTER_IMAP: ${{ secrets.NEWSLETTER_IMAP }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cd pipeline
          python main.py

name: MediaAuto — Retraitement transcriptions

on:
  schedule:
    # Toutes les 15 min (repo public = minutes Actions gratuites/illimitées).
    # Traite les transcriptions collées sur le site. No-op si rien en attente.
    - cron: "*/15 * * * *"
  workflow_dispatch:  # bouton « Run workflow » pour un traitement INSTANTANÉ

# Évite deux retraitements simultanés (éviter de régénérer deux fois le même post)
concurrency:
  group: reprocess
  cancel-in-progress: false

jobs:
  reprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reprocess pending transcripts
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          cd pipeline
          python reprocess.py

name: MediaAuto — Résultats Sportifs

on:
  schedule:
    # Toutes les 30 min de 17h00 à 02h00 UTC (19h-04h Paris été)
    # Couvre les matchs de l'après-midi jusqu'aux derniers matchs NBA
    - cron: "0,30 17-23 * * *"
    - cron: "0,30 0-2 * * *"
  workflow_dispatch:   # déclenchement manuel depuis GitHub Actions

jobs:
  sports:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sports results
        env:
          API_SPORTS_KEY:        ${{ secrets.API_SPORTS_KEY }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
          NTFY_TOPIC:            ${{ secrets.NTFY_TOPIC }}
        run: |
          cd pipeline/sports
          python sports_main.py
